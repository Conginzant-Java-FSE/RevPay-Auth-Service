server.port=8080

spring.application.name=auth-service

# Bootstrap: fetch config from Config Server before startup
spring.config.import=optional:configserver:http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${CONFIG_SERVER_HOST:config-server}:8888

# Local fallback datasource (used if config-server is unreachable)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Midhun21}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.task.scheduling.enabled=true

jwt.secret=${JWT_SECRET:fallback-secret-key-change-this-in-production-min-32-chars}
jwt.expiration=86400000

# Eureka Client
eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${EUREKA_HOST:eureka-server}:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10

# Resilience4j for OpenFeign calls
resilience4j.circuitbreaker.instances.notificationService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.notificationService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notificationService.waitDurationInOpenState=10s

management.endpoints.web.exposure.include=health,info,refresh

logging.level.com.revpay.auth=DEBUG

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html